<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Monitor — Cloud Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #13151a; color: #e2e8f0; min-height: 100vh; font-size: 0.9rem; line-height: 1.5; }
    .nav { position: sticky; top: 0; z-index: 100; height: 56px; background: #0d0f14; box-shadow: 0 2px 8px rgba(0,0,0,0.5); display: flex; align-items: center; padding: 0 24px; gap: 12px; }
    .nav-logo { display: flex; align-items: center; gap: 10px; font-size: 1rem; font-weight: 700; color: #e2e8f0; text-decoration: none; }
    .nav-logo svg { color: #0078d4; }
    .nav-right { margin-left: auto; display: flex; align-items: center; gap: 12px; }
    .nav-btn { display: flex; align-items: center; gap: 6px; font-size: 0.75rem; font-weight: 600; padding: 5px 12px; border-radius: 7px; border: 1px solid rgba(255,255,255,0.12); background: rgba(255,255,255,0.06); color: #e2e8f0; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
    .nav-btn:hover { background: rgba(255,255,255,0.1); }
    .nav-btn.paused { color: #fbbf24; border-color: rgba(251,191,36,0.35); background: rgba(120,83,0,0.3); }
    .nav-btn.test-btn { color: #93c5fd; border-color: rgba(59,130,246,0.3); background: rgba(30,58,95,0.4); }
    .agent-card { display: flex; flex-direction: column; gap: 12px; padding: 16px; border-radius: 14px; border: 1px solid; box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04); backdrop-filter: blur(12px); position: relative; overflow: hidden; }
    .agent-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
    .agent-card.ok   { background: linear-gradient(135deg, rgba(34,197,94,0.08) 0%, transparent 70%), rgba(22,25,34,0.9); border-color: rgba(34,197,94,0.25); }
    .agent-card.ok::before { background: linear-gradient(90deg, #16a34a, #22c55e); }
    .agent-card.warn { background: linear-gradient(135deg, rgba(251,191,36,0.08) 0%, transparent 70%), rgba(22,25,34,0.9); border-color: rgba(251,191,36,0.25); }
    .agent-card.warn::before { background: linear-gradient(90deg, #78350f, #fbbf24); }
    .agent-card.dead { background: linear-gradient(135deg, rgba(220,38,38,0.08) 0%, transparent 70%), rgba(22,25,34,0.9); border-color: rgba(220,38,38,0.3); }
    .agent-card.dead::before { background: linear-gradient(90deg, #dc2626, #f87171); }
    .agent-card-icon.ok   { color: #22c55e; }
    .agent-card-icon.warn { color: #fbbf24; }
    .agent-card-icon.dead { color: #f87171; }
    .agent-card-main { flex: 1; min-width: 140px; }
    .agent-card-title { font-size: 1rem; font-weight: 700; color: #e2e8f0; }
    .agent-card-sub { font-size: 0.75rem; color: #64748b; margin-top: 2px; }
    .agent-status-dot { width: 14px; height: 14px; border-radius: 50%; flex-shrink: 0; }
    .agent-status-dot.ok   { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); }
    .agent-status-dot.warn { background: #fbbf24; box-shadow: 0 0 8px rgba(251,191,36,0.4); }
    .agent-status-dot.dead { background: #dc2626; box-shadow: 0 0 8px rgba(220,38,38,0.5); }
    .agent-status-text { font-size: 1rem; font-weight: 700; }
    .agent-status-text.ok   { color: #22c55e; }
    .agent-status-text.warn { color: #fbbf24; }
    .agent-status-text.dead { color: #f87171; }
    .page { max-width: 1300px; margin: 0 auto; padding: 24px 20px 48px; }
    .page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
    .page-title { font-size: 1.3rem; font-weight: 700; }
    .page-subtitle { font-size: 0.8rem; color: #64748b; margin-top: 2px; }
    .agent-banner { display: none; align-items: center; gap: 10px; background: rgba(120,53,15,0.35); border: 1px solid rgba(251,191,36,0.3); border-radius: 10px; padding: 12px 16px; margin-bottom: 20px; font-size: 0.82rem; color: #fbbf24; }
    .agent-banner.visible { display: flex; }
    .stats-bar { display: flex; gap: 12px; margin-bottom: 24px; flex-wrap: wrap; }
    .stat-chip { background: rgba(28,31,38,0.82); border: 1px solid rgba(255,255,255,0.07); border-radius: 12px; padding: 10px 18px; display: flex; flex-direction: column; gap: 2px; min-width: 110px; backdrop-filter: blur(12px); }
    .stat-chip-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.05em; color: #94a3b8; }
    .stat-chip-value { font-size: 1.4rem; font-weight: 700; color: #e2e8f0; }
    .stat-chip.up   { border-color: rgba(22,183,75,0.4);  background: rgba(5,46,22,0.3); }
    .stat-chip.down { border-color: rgba(220,38,38,0.45); background: rgba(127,29,29,0.25); }
    .stat-chip.up   .stat-chip-value { color: #22c55e; }
    .stat-chip.down .stat-chip-value { color: #f87171; }
    .device-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .device-card { position: relative; background: linear-gradient(135deg, rgba(0,120,212,0.08) 0%, transparent 70%), rgba(22,25,34,0.82); border: 1px solid rgba(255,255,255,0.07); border-radius: 14px; box-shadow: 0 4px 24px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.04); backdrop-filter: blur(12px); overflow: hidden; }
    .device-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; background: linear-gradient(90deg, #0078d4, #38bdf8); }
    .device-card.status-up::before      { background: linear-gradient(90deg, #16a34a, #22c55e); }
    .device-card.status-down::before    { background: linear-gradient(90deg, #dc2626, #f87171); }
    .device-card.status-unknown::before { background: linear-gradient(90deg, #78350f, #fbbf24); }
    .device-card-header { display: flex; align-items: flex-start; justify-content: space-between; padding: 16px 16px 10px; border-bottom: 1px solid rgba(255,255,255,0.06); }
    .device-name { font-size: 0.95rem; font-weight: 700; color: #e2e8f0; }
    .device-host { font-size: 0.75rem; color: #64748b; margin-top: 2px; word-break: break-all; }
    .type-badge { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 3px 7px; border-radius: 5px; flex-shrink: 0; margin-top: 2px; }
    .badge-ping    { background: rgba(30,58,95,0.8);  color: #93c5fd; border: 1px solid rgba(59,130,246,0.25); }
    .badge-http    { background: rgba(46,16,101,0.8); color: #c4b5fd; border: 1px solid rgba(139,92,246,0.25); }
    .badge-service { background: rgba(69,26,3,0.8);  color: #fcd34d; border: 1px solid rgba(245,158,11,0.25); }
    .badge-cloud   { background: rgba(6,36,52,0.8);  color: #67e8f9; border: 1px solid rgba(6,182,212,0.25); }
    .device-card-body { padding: 14px 16px; }
    .status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .status-dot { width: 12px; height: 12px; border-radius: 50%; background: #64748b; flex-shrink: 0; }
    .status-dot.up      { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); }
    .status-dot.down    { background: #dc2626; box-shadow: 0 0 8px rgba(220,38,38,0.5); }
    .status-dot.unknown { background: #fbbf24; }
    .status-text { font-size: 0.9rem; font-weight: 700; }
    .status-text.up      { color: #22c55e; }
    .status-text.down    { color: #f87171; }
    .status-text.unknown { color: #fbbf24; }
    .status-msg { font-size: 0.72rem; color: #64748b; margin-left: auto; text-align: right; }
    .device-meta { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
    .meta-item { font-size: 0.75rem; color: #94a3b8; }
    .meta-item strong { color: #e2e8f0; }
    .sparkline { display: flex; gap: 3px; align-items: center; margin-bottom: 4px; }
    .spark-dot { width: 7px; height: 7px; border-radius: 50%; background: #2e3440; }
    .spark-dot.ok  { background: #22c55e; }
    .spark-dot.err { background: #dc2626; }
    .pending-alert { font-size: 0.72rem; color: #fbbf24; margin-bottom: 8px; display: flex; align-items: center; gap: 5px; }
    .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; padding: 60px 20px; color: #64748b; text-align: center; grid-column: 1/-1; }
    .empty-state svg { opacity: 0.3; }
    @keyframes pulse { 0%,100%{opacity:1}50%{opacity:0.4} }
    .loading { animation: pulse 1.5s ease infinite; }
    @media (max-width:600px) { .page{padding:16px 12px 48px} .device-grid{grid-template-columns:1fr} .nav{padding:0 12px} }
  </style>
</head>
<body>

<nav class="nav">
  <a class="nav-logo" href="#">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
    </svg>
    System Monitor
  </a>
  <div class="nav-right">
    <span style="font-size:0.72rem;color:#64748b;" id="last-updated">Connecting…</span>
    <button class="nav-btn test-btn" onclick="sendTestNotification()" title="Send a test ntfy notification">
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Test Alert
    </button>
    <button class="nav-btn" id="pause-btn" onclick="togglePause()">
      <svg id="pause-icon" xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
      <span id="pause-label">Pause Alerts</span>
    </button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">Dashboard</div>
      <div class="page-subtitle">Live view — updates every 15 seconds</div>
    </div>
  </div>

<div class="stats-bar">
    <div class="stat-chip"><span class="stat-chip-label">Total</span><span class="stat-chip-value loading" id="stat-total">—</span></div>
    <div class="stat-chip up"><span class="stat-chip-label">Online</span><span class="stat-chip-value loading" id="stat-up">—</span></div>
    <div class="stat-chip down"><span class="stat-chip-label">Offline</span><span class="stat-chip-value loading" id="stat-down">—</span></div>
    <div class="stat-chip"><span class="stat-chip-label">Unknown</span><span class="stat-chip-value loading" id="stat-unknown">—</span></div>
  </div>

  <div class="device-grid" id="device-grid">
    <div class="empty-state loading">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <p>Connecting to Supabase…</p>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL      = 'https://cdahcsbixbeicbkedvrf.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNkYWhjc2JpeGJlaWNia2VkdnJmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzgwMDYxMTIsImV4cCI6MjA5MzU4MjExMn0.XyUuvPFFZsxBPUz3NvpOSZ-sxdpSzv39nypwwrHiFeo';
const NTFY_SERVER       = 'https://ntfy.sh';
const NTFY_TOPIC        = 'workassist-mark-2026';

const AGENT_WARN_MS = 3  * 60 * 1000;
const AGENT_DEAD_MS = 10 * 60 * 1000;

let isPaused = false;
let lastDevices = [];

async function loadPauseState() {
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/meta?key=eq.monitoring_paused&select=value`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    const data = await res.json();
    isPaused = data.length > 0 && data[0].value === 'true';
    updatePauseButton();
  } catch (_) {}
}

async function togglePause() {
  isPaused = !isPaused;
  updatePauseButton();
  const nowIso = new Date().toISOString();
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/meta`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates',
      },
      body: JSON.stringify({ key: 'monitoring_paused', value: String(isPaused), updated_at: nowIso }),
    });
  } catch (_) {}
}

function updatePauseButton() {
  const btn = document.getElementById('pause-btn');
  const label = document.getElementById('pause-label');
  const icon = document.getElementById('pause-icon');
  if (isPaused) {
    btn.classList.add('paused');
    label.textContent = 'Resume Alerts';
    icon.innerHTML = '<polygon points="5 3 19 12 5 21 5 3"/>';
  } else {
    btn.classList.remove('paused');
    label.textContent = 'Pause Alerts';
    icon.innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
  }
}

async function sendTestNotification() {
  const btn = document.querySelector('.test-btn');
  const orig = btn.innerHTML;
  btn.innerHTML = '…sending';
  btn.disabled = true;

  const up      = lastDevices.filter(d => d.status === 'up').length;
  const down    = lastDevices.filter(d => d.status === 'down').length;
  const unknown = lastDevices.filter(d => d.status !== 'up' && d.status !== 'down').length;

  const downList = lastDevices
    .filter(d => d.status === 'down')
    .map(d => `  - ${d.name} (${d.host || d.url || ''})`)
    .join('\n');

  const body = [
    `Status Report - ${new Date().toLocaleString()}`,
    `Online: ${up}  Offline: ${down}  Unknown: ${unknown}`,
    downList ? `\nOffline devices:\n${downList}` : '',
  ].filter(Boolean).join('\n');

  const hasDown = down > 0;

  try {
    const res = await fetch(`${NTFY_SERVER}/${NTFY_TOPIC}`, {
      method: 'POST',
      headers: {
        Title: hasDown ? `System Monitor - ${down} Device(s) Offline` : 'System Monitor - All Systems Online',
        Priority: hasDown ? 'max' : 'default',
        Tags: hasDown ? 'rotating_light' : 'white_check_mark',
        Click: 'https://markbritton-hue.github.io/systemmonitor/',
        'Content-Type': 'text/plain',
      },
      body,
    });
    btn.innerHTML = res.ok ? '✓ Sent' : '✗ Failed';
  } catch (_) {
    btn.innerHTML = '✗ Failed';
  }
  setTimeout(() => { btn.innerHTML = orig; btn.disabled = false; }, 2500);
}

function escHtml(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
function timeAgo(iso) {
  if (!iso) return 'never';
  const diff = Math.floor((Date.now() - new Date(iso)) / 1000);
  if (diff < 5)    return 'just now';
  if (diff < 60)   return diff + 's ago';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  return Math.floor(diff/3600) + 'h ago';
}
function formatMs(ms) {
  if (ms == null) return '—';
  return ms < 1000 ? ms + 'ms' : (ms/1000).toFixed(1) + 's';
}
function typeBadge(type) {
  const map = { ping:['PING','badge-ping'], http:['HTTP','badge-http'], service:['API','badge-service'], cloud:['CLOUD','badge-cloud'] };
  const [label,cls] = map[type] || ['?','badge-ping'];
  return `<span class="type-badge ${cls}">${label}</span>`;
}
function sparkline(history) {
  if (!history||!history.length) return '<div class="sparkline"></div>';
  return '<div class="sparkline">'+history.map(ok=>`<div class="spark-dot ${ok?'ok':'err'}"></div>`).join('')+'</div>';
}
function statusClass(s) { return s==='up'?'up':s==='down'?'down':'unknown'; }

function renderCard(d) {
  const sc = statusClass(d.status);
  const pendingAlert = sc==='down' && d.notify_after_minutes && !d.notify_down_sent;
  return `
  <div class="device-card status-${sc}">
    <div class="device-card-header">
      <div>
        <div class="device-name">${escHtml(d.name)}</div>
        <div class="device-host">${escHtml(d.host||'')}</div>
      </div>
      ${typeBadge(d.type)}
    </div>
    <div class="device-card-body">
      <div class="status-row">
        <div class="status-dot ${sc}"></div>
        <div class="status-text ${sc}">${sc==='up'?'Online':sc==='down'?'Offline':'Unknown'}</div>
        <div class="status-msg">${escHtml(d.message||'')}</div>
      </div>
      ${pendingAlert?`<div class="pending-alert">
        <svg xmlns="http://www.w3.org/2000/svg" width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        Alert pending — offline &lt; ${d.notify_after_minutes}m threshold</div>`:''}
      <div class="device-meta">
        <div class="meta-item">Response: <strong>${formatMs(d.response_time)}</strong></div>
        <div class="meta-item">Checked: <strong>${timeAgo(d.last_check)}</strong></div>
        ${d.notify_after_minutes?`<div class="meta-item">Alert after: <strong>${d.notify_after_minutes}m offline</strong></div>`:''}
      </div>
      ${sparkline(d.history)}
    </div>
  </div>`;
}

function renderAgentCard(devices) {
  const latest = devices.map(d=>d.agent_heartbeat?new Date(d.agent_heartbeat).getTime():0).reduce((a,b)=>Math.max(a,b),0);
  if (!latest) return '';
  const age = Date.now() - latest;
  const ageMin = Math.floor(age / 60000);
  let cls, statusText, subText;
  if (age < AGENT_WARN_MS) {
    cls = 'ok'; statusText = 'Online'; subText = 'Last seen ' + timeAgo(new Date(latest).toISOString());
  } else if (age < AGENT_DEAD_MS) {
    cls = 'warn'; statusText = 'Late'; subText = `Last seen ${ageMin}m ago — data may be stale`;
  } else {
    cls = 'dead'; statusText = 'Offline'; subText = `No report in ${ageMin}m — internet or server may be down`;
  }
  return `
  <div class="agent-card ${cls}">
    <div style="display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(255,255,255,0.06);padding-bottom:12px;">
      <div class="agent-card-icon ${cls}">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="2" width="20" height="8" rx="2"/><rect x="2" y="14" width="20" height="8" rx="2"/><line x1="6" y1="6" x2="6.01" y2="6"/><line x1="6" y1="18" x2="6.01" y2="18"/></svg>
      </div>
      <div class="agent-card-main">
        <div class="agent-card-title">Local Agent</div>
        <div class="agent-card-sub">System Monitor service</div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;">
      <div class="agent-status-dot ${cls}"></div>
      <div class="agent-status-text ${cls}">${statusText}</div>
    </div>
    <div style="font-size:0.75rem;color:#94a3b8;">${subText}</div>
  </div>`;
}

async function writeCloudHeartbeat() {
  try {
    await fetch(`${SUPABASE_URL}/rest/v1/devices`, {
      method: 'POST',
      headers: {
        apikey: SUPABASE_ANON_KEY,
        Authorization: `Bearer ${SUPABASE_ANON_KEY}`,
        'Content-Type': 'application/json',
        Prefer: 'resolution=merge-duplicates',
      },
      body: JSON.stringify({
        id: 'cloud-dashboard',
        name: 'Cloud Dashboard',
        type: 'cloud',
        host: 'GitHub Pages',
        status: 'up',
        enabled: true,
        message: 'Cloud dashboard active',
        agent_heartbeat: new Date().toISOString(),
        history: [],
      }),
    });
  } catch (_) {}
}

async function loadDevices() {
  writeCloudHeartbeat();
  try {
    const res = await fetch(`${SUPABASE_URL}/rest/v1/devices?select=*`, {
      headers: { apikey: SUPABASE_ANON_KEY, Authorization: `Bearer ${SUPABASE_ANON_KEY}` }
    });
    if (!res.ok) throw new Error(`${res.status} ${res.statusText}`);
    const all = await res.json();
    const devices = all.filter(d => d.id !== 'cloud-dashboard');
    lastDevices = devices;

    const up      = devices.filter(d=>d.status==='up').length;
    const down    = devices.filter(d=>d.status==='down').length;
    const unknown = devices.filter(d=>d.status!=='up'&&d.status!=='down').length;
    document.getElementById('stat-total').textContent   = devices.length;
    document.getElementById('stat-up').textContent      = up;
    document.getElementById('stat-down').textContent    = down;
    document.getElementById('stat-unknown').textContent = unknown;
    document.getElementById('last-updated').textContent = 'Updated ' + new Date().toLocaleTimeString();
    document.querySelectorAll('.loading').forEach(el=>el.classList.remove('loading'));

    devices.sort((a,b)=>{ const o={down:0,unknown:1,up:2}; return (o[a.status]??1)-(o[b.status]??1); });

    const grid = document.getElementById('device-grid');
    const agentCard = renderAgentCard(devices);
    if (!devices.length) {
      grid.innerHTML = agentCard + `<div class="empty-state">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
        <p>No devices yet.<br>Start the local agent to begin syncing.</p>
      </div>`;
    } else {
      grid.innerHTML = agentCard + devices.map(renderCard).join('');
    }
  } catch(err) {
    document.getElementById('device-grid').innerHTML = `<div class="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></svg>
      <p>Error: ${escHtml(err.message)}</p>
    </div>`;
  }
}

loadPauseState();
loadDevices();
setInterval(loadDevices, 15000);
</script>
</body>
</html>
